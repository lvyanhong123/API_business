<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户自助门户</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
    .header { background: #001529; color: #fff; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 18px; font-weight: bold; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .logout-btn { background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; }
    .card-header { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .card-title { font-size: 16px; font-weight: 500; color: #333; }
    .card-body { padding: 20px; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .stat-value { font-size: 28px; font-weight: bold; color: #1890ff; }
    .stat-label { color: #666; margin-top: 5px; font-size: 14px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background: #fafafa; font-weight: 500; color: #333; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status-active { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .status-inactive { background: #fff2e8; color: #fa8c16; border: 1px solid #ffbb6b; }
    .status-pending { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: #fff; border: 1px solid #d9d9d9; border-radius: 4px; cursor: pointer; }
    .tab.active { background: #1890ff; color: #fff; border-color: #1890ff; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; padding: 20px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { margin-bottom: 20px; font-size: 18px; font-weight: 500; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .api-key-box { background: #f5f5f5; padding: 15px; border-radius: 4px; font-family: monospace; word-break: break-all; margin: 10px 0; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 400px; }
    .login-box h2 { text-align: center; margin-bottom: 30px; }
    .login-box .form-group { margin-bottom: 20px; }
    .login-box .btn { width: 100%; padding: 12px; font-size: 16px; }
    .hidden { display: none !important; }
    .enterprise-selector { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 4px; }
    .enterprise-selector select { border: none; background: transparent; font-size: 14px; cursor: pointer; color: #fff; }
    .enterprise-selector span { color: rgba(255,255,255,0.7); font-size: 14px; }
    .enterprise-badge { background: #1890ff; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .enterprise-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #e8e8e8; border-radius: 4px; margin-bottom: 10px; }
    .enterprise-item:hover { border-color: #1890ff; }
    .enterprise-item.current { border-color: #1890ff; background: #e6f7ff; }
    .enterprise-name { font-weight: 500; }
    .enterprise-role { font-size: 12px; color: #999; }
    .enterprise-actions { display: flex; gap: 10px; }
    .no-enterprise { text-align: center; padding: 60px 20px; }
    .no-enterprise h3 { margin-bottom: 20px; color: #666; }
    .no-enterprise p { color: #999; margin-bottom: 20px; }
    .bind-enterprise-list { max-height: 300px; overflow-y: auto; }
    .bind-enterprise-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; }
    .bind-enterprise-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h2>客户登录</h2>
      <div class="form-group">
        <label>手机号</label>
        <input type="text" id="loginUsername" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
      <p style="text-align:center;margin-top:15px;color:#666;">
        还没有账号？<a href="#" onclick="showRegister()" style="color:#1890ff;">立即注册</a>
      </p>
    </div>
  </div>

  <div id="mainPage" class="hidden">
    <div class="header">
      <div class="logo">客户自助门户</div>
      <div class="user-info">
        <div class="enterprise-selector hidden" id="enterpriseSelector">
          <span>当前企业：</span>
          <select id="currentEnterprise" onchange="switchEnterprise()"></select>
        </div>
        <span id="userName"></span>
        <button class="logout-btn" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="container" id="mainContainer">
      <div class="no-enterprise" id="noEnterprise">
        <h3>您还没有绑定任何企业</h3>
        <p>可以创建新企业或申请绑定已有企业</p>
        <div style="display: flex; gap: 15px; justify-content: center;">
          <button class="btn btn-primary" onclick="showCreateEnterpriseModal()">创建企业</button>
          <button class="btn btn-default" onclick="showBindEnterpriseModal()">绑定已有企业</button>
        </div>
      </div>

      <div class="hidden" id="enterpriseContent">
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-value" id="statBalance">¥0</div>
            <div class="stat-label">账户余额</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statQuota">0</div>
            <div class="stat-label">API配额</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statCalls">0</div>
            <div class="stat-label">总调用次数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statOrders">0</div>
            <div class="stat-label">订单数</div>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" onclick="switchTab('products')">产品列表</div>
          <div class="tab" onclick="switchTab('orders')">我的订单</div>
          <div class="tab" onclick="switchTab('apikeys')">API密钥</div>
          <div class="tab" onclick="switchTab('calllogs')">调用记录</div>
          <div class="tab" onclick="switchTab('enterprise')">企业管理</div>
          <div class="tab" onclick="switchTab('approvals')" id="approvalsTabBtn" style="display:none;">审批管理</div>
        </div>

        <div id="productsTab">
          <div class="card">
            <div class="card-header">
              <div class="card-title">可购买产品</div>
            </div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>产品编码</th><th>产品名称</th><th>计费方式</th><th>价格</th><th>操作</th></tr></thead>
                  <tbody id="productsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div id="ordersTab" class="hidden">
          <div class="card">
            <div class="card-header">
              <div class="card-title">我的订单</div>
            </div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>订单号</th><th>产品</th><th>类型</th><th>金额</th><th>审核状态</th><th>支付状态</th><th>时间</th></tr></thead>
                  <tbody id="ordersTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div id="apikeysTab" class="hidden">
          <div class="card">
            <div class="card-header">
              <div class="card-title">我的API密钥</div>
            </div>
            <div class="card-body">
              <div style="margin-bottom:15px;">
                <select id="apiKeyType" onchange="loadApiKeys()" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;">
                  <option value="enterprise">企业API密钥</option>
                  <option value="personal">个人API密钥</option>
                </select>
                <button class="btn btn-primary btn-small" onclick="showGenerateApiKeyModal()" style="margin-left:10px;">生成新密钥</button>
              </div>
              <div id="apiKeyList"></div>
            </div>
          </div>
        </div>

        <div id="calllogsTab" class="hidden">
          <div class="card">
            <div class="card-header">
              <div class="card-title">调用记录</div>
            </div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>调用时间</th><th>产品</th><th>响应码</th><th>响应信息</th><th>耗时</th></tr></thead>
                  <tbody id="callLogsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div id="enterpriseTab" class="hidden">
          <div class="card">
            <div class="card-header">
              <div class="card-title">绑定的企业</div>
              <div>
                <button class="btn btn-default btn-small" onclick="showBindEnterpriseModal()">绑定新企业</button>
                <button class="btn btn-primary btn-small" onclick="showCreateEnterpriseModal()">创建企业</button>
              </div>
            </div>
            <div class="card-body" id="enterpriseList"></div>
          </div>

          <div class="card" id="pendingBindsCard" class="hidden">
            <div class="card-header">
              <div class="card-title">我的申请记录</div>
            </div>
            <div class="card-body" id="myApplicationsList"></div>
          </div>
        </div>

        <div id="approvalsTab" class="hidden">
          <div class="card">
            <div class="card-header">
              <div class="card-title">待审批的绑定申请</div>
            </div>
            <div class="card-body" id="pendingApprovalsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="registerModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">账号注册</div>
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="regName" placeholder="请输入姓名">
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="text" id="regUsername" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('registerModal')">取消</button>
        <button class="btn btn-primary" onclick="doRegister()">注册</button>
      </div>
    </div>
  </div>

  <div id="createEnterpriseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">创建企业</div>
      <div class="form-group">
        <label>公司名称</label>
        <input type="text" id="createCompanyName" placeholder="请输入公司名称">
      </div>
      <div class="form-group">
        <label>营业执照号</label>
        <input type="text" id="createLicense" placeholder="请输入营业执照号">
      </div>
      <div class="form-group">
        <label>联系人</label>
        <input type="text" id="createContact" placeholder="请输入联系人">
      </div>
      <div class="form-group">
        <label>联系人手机</label>
        <input type="text" id="createContactPhone" placeholder="请输入联系人手机">
      </div>
      <div class="form-group">
        <label>联系人邮箱</label>
        <input type="text" id="createContactEmail" placeholder="请输入联系人邮箱">
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('createEnterpriseModal')">取消</button>
        <button class="btn btn-primary" onclick="doCreateEnterprise()">创建</button>
      </div>
    </div>
  </div>

  <div id="bindEnterpriseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">绑定已有企业</div>
      <div class="form-group">
        <label>企业ID</label>
        <input type="number" id="bindCustomerId" placeholder="请输入企业ID">
      </div>
      <p style="color:#999;font-size:12px;margin-bottom:15px;">请向企业管理员获取企业ID</p>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('bindEnterpriseModal')">取消</button>
        <button class="btn btn-primary" onclick="doBindEnterprise()">申请绑定</button>
      </div>
    </div>
  </div>

  <div id="changeAdminModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">申请更换管理员</div>
      <div class="form-group">
        <label>当前企业</label>
        <div id="changeAdminCompanyName" style="padding:8px;background:#f5f5f5;border-radius:4px;"></div>
      </div>
      <div class="form-group">
        <label>选择新管理员</label>
        <select id="newAdminAccountId" style="padding:10px;border:1px solid #d9d9d9;border-radius:4px;width:100%;"></select>
      </div>
      <p style="color:#999;font-size:12px;margin-bottom:15px;">提交后需等待平台管理员审批</p>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('changeAdminModal')">取消</button>
        <button class="btn btn-primary" onclick="doChangeAdmin()">提交申请</button>
      </div>
    </div>
  </div>

  <div id="orderModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">购买产品</div>
      <div class="form-group">
        <label>产品</label>
        <div id="orderProductName" style="padding:8px;background:#f5f5f5;border-radius:4px;"></div>
      </div>
      <div class="form-group">
        <label>计费类型</label>
        <select id="orderType" onchange="toggleQuantity()">
          <option value="per_call">按次计费</option>
          <option value="subscription">包月订阅</option>
        </select>
      </div>
      <div class="form-group" id="quantityGroup">
        <label>购买次数</label>
        <input type="number" id="orderQuantity" value="100" min="1">
      </div>
      <div class="form-group" id="monthsGroup" style="display:none;">
        <label>订阅月数</label>
        <input type="number" id="orderMonths" value="1" min="1">
      </div>
      <div class="form-group">
        <label>支付类型</label>
        <select id="orderPaymentType">
          <option value="prepay">预付费（先充值后消费）</option>
          <option value="postpay">后付费（月底结算）</option>
        </select>
      </div>
      <div class="form-group">
        <label>支付账户</label>
        <select id="orderPaymentMethod">
          <option value="balance">账户余额</option>
          <option value="credit">信用额度</option>
        </select>
      </div>
      <div style="padding:10px;background:#e6f7ff;border-radius:4px;margin-bottom:15px;">
        应付金额：<span id="orderAmount" style="font-size:20px;font-weight:bold;color:#1890ff;">¥0</span>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('orderModal')">取消</button>
        <button class="btn btn-primary" onclick="submitOrder()">提交订单</button>
      </div>
    </div>
  </div>

  <div id="generateApiKeyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">生成API密钥</div>
      <div class="form-group">
        <label>密钥类型</label>
        <select id="newApiKeyType">
          <option value="enterprise">企业API密钥</option>
          <option value="personal">个人API密钥</option>
        </select>
      </div>
      <div class="form-group">
        <label>产品（可选）</label>
        <select id="newApiKeyProduct">
          <option value="">不限产品</option>
        </select>
      </div>
      <div id="generatedApiKeyContent" style="display:none;">
        <div class="api-key-box" id="generatedApiKeyBox"></div>
      </div>
      <div class="modal-footer" id="generateApiKeyFooter">
        <button class="btn btn-default" onclick="closeModal('generateApiKeyModal')">关闭</button>
        <button class="btn btn-primary" onclick="doGenerateApiKey()">生成</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001/api';
    let token = localStorage.getItem('accountToken');
    let accountId = localStorage.getItem('accountId');
    let accountName = localStorage.getItem('accountName');
    let currentEnterpriseId = localStorage.getItem('currentEnterpriseId');
    let currentEnterpriseName = localStorage.getItem('currentEnterpriseName');
    let enterprises = [];
    let currentProduct = null;
    let products = [];
    let currentTab = localStorage.getItem('clientCurrentTab') || 'products';

    if (token) {
      showMainPage();
    }

    function showRegister() {
      document.getElementById('registerModal').classList.add('show');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
      if (id === 'generateApiKeyModal') {
        document.getElementById('generatedApiKeyContent').style.display = 'none';
        document.getElementById('generateApiKeyFooter').style.display = 'flex';
      }
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        alert('请填写完整信息');
        return;
      }

      const res = await fetch(API_BASE + '/accounts/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('accountToken', data.token);
        localStorage.setItem('accountId', data.account.id);
        localStorage.setItem('accountName', data.account.name);
        token = data.token;
        accountId = data.account.id;
        accountName = data.account.name;
        showMainPage();
      } else {
        alert(data.message || '登录失败');
      }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value;
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;

      if (!name || !username || !password) {
        alert('请填写完整信息');
        return;
      }

      if (!/^1[3-9]\d{9}$/.test(username)) {
        alert('请输入正确的手机号');
        return;
      }

      if (password.length < 6) {
        alert('密码长度不能少于6位');
        return;
      }

      const res = await fetch(API_BASE + '/accounts/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, username, password })
      });

      const data = await res.json();
      if (res.ok) {
        alert('注册成功，请登录');
        closeModal('registerModal');
        document.getElementById('loginUsername').value = username;
      } else {
        alert(data.message || '注册失败');
      }
    }

    function logout() {
      localStorage.removeItem('accountToken');
      localStorage.removeItem('accountId');
      localStorage.removeItem('accountName');
      localStorage.removeItem('currentEnterpriseId');
      localStorage.removeItem('currentEnterpriseName');
      location.reload();
    }

    async function showMainPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
      document.getElementById('userName').textContent = accountName;
      await loadProfile();
      switchTab(currentTab);
    }

    async function loadProfile() {
      try {
        const res = await fetch(API_BASE + '/accounts/profile', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.message || '获取信息失败');
          logout();
          return;
        }

        enterprises = data.customers || [];
        renderEnterpriseSelector();
        loadProducts();

        const isAdmin = enterprises.some(e => e.role === 'admin');
        if (isAdmin) {
          document.getElementById('approvalsTabBtn').style.display = 'block';
        } else {
          document.getElementById('approvalsTabBtn').style.display = 'none';
        }

        if (enterprises.length === 0) {
          document.getElementById('noEnterprise').classList.remove('hidden');
          document.getElementById('enterpriseContent').classList.add('hidden');
          document.getElementById('enterpriseSelector').classList.add('hidden');
        } else {
          document.getElementById('noEnterprise').classList.add('hidden');
          document.getElementById('enterpriseContent').classList.remove('hidden');
          document.getElementById('enterpriseSelector').classList.remove('hidden');

          if (!currentEnterpriseId || !enterprises.find(e => e.customerId === parseInt(currentEnterpriseId))) {
            currentEnterpriseId = enterprises[0].customerId;
            currentEnterpriseName = enterprises[0].companyName;
            localStorage.setItem('currentEnterpriseId', currentEnterpriseId);
            localStorage.setItem('currentEnterpriseName', currentEnterpriseName);
          }

          renderEnterpriseSelector();
          loadStats();
        }
      } catch (error) {
        console.error('loadProfile error:', error);
        alert('获取信息失败');
        logout();
      }
    }

    function renderEnterpriseSelector() {
      const select = document.getElementById('currentEnterprise');
      select.innerHTML = enterprises.map(e =>
        `<option value="${e.customerId}" ${e.customerId === parseInt(currentEnterpriseId) ? 'selected' : ''}>${e.companyName}</option>`
      ).join('');
    }

    function switchEnterprise() {
      const select = document.getElementById('currentEnterprise');
      currentEnterpriseId = select.value;
      currentEnterpriseName = enterprises.find(e => e.customerId === parseInt(currentEnterpriseId))?.companyName || '';
      localStorage.setItem('currentEnterpriseId', currentEnterpriseId);
      localStorage.setItem('currentEnterpriseName', currentEnterpriseName);
      loadStats();
    }

    function showCreateEnterpriseModal() {
      document.getElementById('createCompanyName').value = '';
      document.getElementById('createLicense').value = '';
      document.getElementById('createContact').value = '';
      document.getElementById('createContactPhone').value = '';
      document.getElementById('createContactEmail').value = '';
      document.getElementById('createEnterpriseModal').classList.add('show');
    }

    async function doCreateEnterprise() {
      const companyName = document.getElementById('createCompanyName').value;
      const businessLicense = document.getElementById('createLicense').value;
      const contact = {
        name: document.getElementById('createContact').value,
        phone: document.getElementById('createContactPhone').value,
        email: document.getElementById('createContactEmail').value
      };

      if (!companyName || !businessLicense || !contact.name || !contact.phone || !contact.email) {
        alert('请填写完整信息');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/accounts/customers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ companyName, businessLicense, contact })
        });

        const data = await res.json();
        if (res.ok) {
          alert('企业创建成功');
          closeModal('createEnterpriseModal');
          await loadProfile();
        } else {
          alert(data.message || '创建失败');
        }
      } catch (error) {
        console.error('doCreateEnterprise error:', error);
        alert('创建失败');
      }
    }

    function showBindEnterpriseModal() {
      document.getElementById('bindCustomerId').value = '';
      document.getElementById('bindEnterpriseModal').classList.add('show');
    }

    async function doBindEnterprise() {
      const customerId = document.getElementById('bindCustomerId').value;

      if (!customerId) {
        alert('请输入企业ID');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/accounts/bind-customer', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ customerId: parseInt(customerId) })
        });

        const data = await res.json();
        if (res.ok) {
          alert(data.message || '申请已提交');
          closeModal('bindEnterpriseModal');
        } else {
          alert(data.message || '绑定失败');
        }
      } catch (error) {
        console.error('doBindEnterprise error:', error);
        alert('绑定失败');
      }
    }

    async function loadStats() {
      if (!token) return;

      const headers = { 'Authorization': 'Bearer ' + token };

      try {
        const [accountRes, keysRes, ordersRes] = await Promise.all([
          fetch(API_BASE + '/my/account-info', { headers }),
          fetch(API_BASE + '/keys/customer?customerId=' + currentEnterpriseId, { headers }),
          fetch(API_BASE + '/orders', { headers })
        ]);

        const account = accountRes.ok ? await accountRes.json() : { balance: 0, creditLimit: 0 };
        const keys = keysRes.ok ? await keysRes.json() : { keys: [] };
        const orders = ordersRes.ok ? await ordersRes.json() : { orders: [] };

        document.getElementById('statBalance').textContent = '¥' + (account.balance || 0);
        document.getElementById('statQuota').textContent = keys.keys?.length || 0;
        document.getElementById('statOrders').textContent = orders.orders?.length || 0;
        document.getElementById('statCalls').textContent = '0';
      } catch (error) {
        console.error('loadStats error:', error);
      }
    }

    async function loadProducts() {
      const res = await fetch(API_BASE + '/products');
      const data = await res.json();
      products = data.products?.filter(p => p.status === 'online') || [];

      document.getElementById('productsTableBody').innerHTML = products.map(p => `
        <tr>
          <td>${p.code}</td>
          <td>${p.name}</td>
          <td>${p.pricingType === 'per_call' ? '按次' : '包月'}</td>
          <td>¥${p.pricingType === 'per_call' ? p.pricePerCall : p.subscriptionPrice}</td>
          <td><button class="btn btn-primary btn-small" onclick="showOrderModal(${p.id})">购买</button></td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="empty">暂无可购买产品</td></tr>';
    }

    async function loadOrders() {
      const res = await fetch(API_BASE + '/orders', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const orders = (data.orders || []).filter(o => o.customerId === parseInt(currentEnterpriseId));

      document.getElementById('ordersTableBody').innerHTML = orders.map(o => `
        <tr>
          <td>${o.orderNo}</td>
          <td>${o.product?.name || '-'}</td>
          <td>${o.orderType === 'per_call' ? '按次' : '包月'}</td>
          <td>¥${o.amount}</td>
          <td><span class="status status-${o.reviewStatus}">${o.reviewStatus === 'pending' ? '待审核' : o.reviewStatus === 'approved' ? '已通过' : '已拒绝'}</span></td>
          <td><span class="status status-${o.paymentStatus}">${o.paymentStatus === 'paid' ? '已支付' : '未支付'}</span></td>
          <td>${new Date(o.createdAt).toLocaleString()}</td>
        </tr>
      `).join('') || '<tr><td colspan="7" class="empty">暂无订单</td></tr>';
    }

    async function loadApiKeys() {
      const type = document.getElementById('apiKeyType').value;
      const headers = { 'Authorization': 'Bearer ' + token };

      try {
        let url = API_BASE + '/accounts/apikeys?type=' + type;
        if (type === 'enterprise' && currentEnterpriseId) {
          url += '&customerId=' + currentEnterpriseId;
        }

        const res = await fetch(url, { headers });
        const data = await res.json();
        const keys = data.keys || [];

        if (keys.length === 0) {
          document.getElementById('apiKeyList').innerHTML = '<div class="empty">暂无API密钥</div>';
        } else {
          document.getElementById('apiKeyList').innerHTML = keys.map(k => `
            <div style="padding:15px;border:1px solid #e8e8e8;border-radius:4px;margin-bottom:10px;">
              <div style="margin-bottom:5px;"><strong>类型：</strong>${k.customerId ? '企业' : '个人'}</div>
              <div style="margin-bottom:5px;"><strong>API Key：</strong><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">${k.apiKey}</code></div>
              ${k.apiSecret ? `<div style="margin-bottom:5px;"><strong>API Secret：</strong><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">${k.apiSecret}</code></div>` : ''}
              <div><strong>状态：</strong><span class="status status-${k.status}">${k.status === 'active' ? '正常' : '已吊销'}</span></div>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('loadApiKeys error:', error);
        document.getElementById('apiKeyList').innerHTML = '<div class="empty">加载失败</div>';
      }
    }

    async function showGenerateApiKeyModal() {
      const type = document.getElementById('apiKeyType').value;
      document.getElementById('newApiKeyType').value = type;
      document.getElementById('generatedApiKeyContent').style.display = 'none';
      document.getElementById('generateApiKeyFooter').style.display = 'flex';
      document.getElementById('generateApiKeyModal').classList.add('show');
    }

    async function doGenerateApiKey() {
      const type = document.getElementById('newApiKeyType').value;
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      };

      const body = {};
      if (type === 'enterprise' && currentEnterpriseId) {
        body.customerId = currentEnterpriseId;
      }

      try {
        const res = await fetch(API_BASE + '/accounts/regenerate-apikey', {
          method: 'POST',
          headers,
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (res.ok && data.key) {
          document.getElementById('generatedApiKeyBox').innerHTML = `
            <div><strong>API Key：</strong>${data.key.apiKey}</div>
            <div style="margin-top:10px;"><strong>API Secret：</strong>${data.key.apiSecret}</div>
          `;
          document.getElementById('generatedApiKeyContent').style.display = 'block';
          document.getElementById('generateApiKeyFooter').style.display = 'none';
          loadApiKeys();
        } else {
          alert(data.message || '生成失败');
        }
      } catch (error) {
        console.error('doGenerateApiKey error:', error);
        alert('生成失败');
      }
    }

    async function loadCallLogs() {
      const res = await fetch(API_BASE + '/call-logs', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const logs = (data.logs || []).filter(l => l.customerId === parseInt(currentEnterpriseId));

      document.getElementById('callLogsTableBody').innerHTML = logs.map(l => `
        <tr>
          <td>${new Date(l.callTime).toLocaleString()}</td>
          <td>${l.productName || '-'}</td>
          <td><span class="status status-${l.success ? 'active' : 'inactive'}">${l.responseCode}</span></td>
          <td>${l.responseMessage || '-'}</td>
          <td>${l.responseTime}ms</td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="empty">暂无调用记录</td></tr>';
    }

    async function loadEnterpriseInfo() {
      renderEnterpriseList();
      await loadPendingBinds();
    }

    function renderEnterpriseList() {
      const list = document.getElementById('enterpriseList');
      if (enterprises.length === 0) {
        list.innerHTML = '<div class="empty">暂无绑定的企业</div>';
        return;
      }

      const currentEnterprise = enterprises.find(e => e.customerId === parseInt(currentEnterpriseId));
      const isAdmin = currentEnterprise?.role === 'admin';

      let actionButtons = '';
      if (isAdmin) {
        actionButtons = `<button class="btn btn-default btn-small" onclick="showChangeAdminModal()">申请更换管理员</button>`;
      }

      list.innerHTML = `
        <div class="enterprise-item current">
          <div>
            <div class="enterprise-name">${currentEnterprise?.companyName || '-'}</div>
            <div class="enterprise-role">${currentEnterprise?.role === 'admin' ? '管理员' : '成员'}</div>
          </div>
          <div class="enterprise-actions">
            <span class="enterprise-badge">当前</span>
          </div>
        </div>
        <div style="margin-top:15px;padding-top:15px;border-top:1px solid #e8e8e8;">
          ${actionButtons}
        </div>
      `;
    }

    async function loadPendingBinds() {
      try {
        const res = await fetch(API_BASE + '/accounts/pending-binds?customerId=' + currentEnterpriseId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (res.ok) {
          const pending = data.pendingBindings || [];
          const list = document.getElementById('pendingApprovalsList');
          if (pending.length === 0) {
            list.innerHTML = '<div class="empty">暂无待审批的申请</div>';
          } else {
            list.innerHTML = pending.map(p => `
              <div class="enterprise-item">
                <div>
                  <div class="enterprise-name">${p.accountName} (${p.username})</div>
                  <div class="enterprise-role">申请时间：${new Date(p.createdAt).toLocaleString()}</div>
                </div>
                <div class="enterprise-actions">
                  <button class="btn btn-primary btn-small" onclick="approveBinding(${p.bindingId})">通过</button>
                  <button class="btn btn-danger btn-small" onclick="rejectBinding(${p.bindingId})">拒绝</button>
                </div>
              </div>
            `).join('');
          }
        }
      } catch (error) {
        console.error('loadPendingBinds error:', error);
      }
    }

    async function loadMyApplications() {
      try {
        const res = await fetch(API_BASE + '/accounts/my-applications', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        const list = document.getElementById('myApplicationsList');
        const applications = data.applications || [];

        if (applications.length === 0) {
          list.innerHTML = '<div class="empty">暂无申请记录</div>';
        } else {
          list.innerHTML = applications.map(a => `
            <div class="enterprise-item">
              <div>
                <div class="enterprise-name">${a.companyName}</div>
                <div class="enterprise-role">${a.type === 'bind' ? '绑定申请' : '更换管理员申请'} - ${a.status === 'pending' ? '等待审批' : a.status}</div>
              </div>
              <div class="enterprise-actions">
                <span class="status status-${a.status === 'pending' ? 'pending' : a.status === 'approved' ? 'active' : 'inactive'}">${a.status === 'pending' ? '待审批' : a.status === 'approved' ? '已通过' : '已拒绝'}</span>
              </div>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('loadMyApplications error:', error);
      }
    }

    async function loadApprovals() {
      await loadPendingBinds();
    }

    async function approveBinding(bindingId) {
      try {
        const res = await fetch(API_BASE + '/accounts/approve-bind/' + bindingId, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ customerId: parseInt(currentEnterpriseId) })
        });

        if (res.ok) {
          alert('已通过审批');
          loadApprovals();
        } else {
          const data = await res.json();
          alert(data.message || '操作失败');
        }
      } catch (error) {
        console.error('approveBinding error:', error);
        alert('操作失败');
      }
    }

    async function rejectBinding(bindingId) {
      try {
        const res = await fetch(API_BASE + '/accounts/reject-bind/' + bindingId, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ customerId: parseInt(currentEnterpriseId) })
        });

        if (res.ok) {
          alert('已拒绝');
          loadApprovals();
        } else {
          const data = await res.json();
          alert(data.message || '操作失败');
        }
      } catch (error) {
        console.error('rejectBinding error:', error);
        alert('操作失败');
      }
    }

    async function showChangeAdminModal() {
      const currentEnterprise = enterprises.find(e => e.customerId === parseInt(currentEnterpriseId));
      if (!currentEnterprise) return;

      document.getElementById('changeAdminCompanyName').textContent = currentEnterprise.companyName;

      const membersRes = await fetch(API_BASE + '/accounts/customers/' + currentEnterpriseId + '/accounts', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const membersData = await membersRes.json();
      const members = (membersData.accounts || []).filter(a => a.role === 'member' && a.status === 'active');

      const select = document.getElementById('newAdminAccountId');
      select.innerHTML = members.map(m =>
        `<option value="${m.accountId}">${m.name || m.username}</option>`
      ).join('');

      document.getElementById('changeAdminModal').classList.add('show');
    }

    async function doChangeAdmin() {
      const newAdminAccountId = document.getElementById('newAdminAccountId').value;
      if (!newAdminAccountId) {
        alert('请选择新管理员');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/accounts/change-admin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            customerId: parseInt(currentEnterpriseId),
            newAdminAccountId: parseInt(newAdminAccountId)
          })
        });

        const data = await res.json();
        if (res.ok) {
          alert(data.message || '申请已提交');
          closeModal('changeAdminModal');
          loadMyApplications();
        } else {
          alert(data.message || '申请失败');
        }
      } catch (error) {
        console.error('doChangeAdmin error:', error);
        alert('申请失败');
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      localStorage.setItem('clientCurrentTab', tab);

      if (event && event.target) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
      } else {
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.remove('active');
          if (t.getAttribute('onclick')?.includes("'" + tab + "'")) {
            t.classList.add('active');
          }
        });
      }

      document.getElementById('productsTab').classList.add('hidden');
      document.getElementById('ordersTab').classList.add('hidden');
      document.getElementById('apikeysTab').classList.add('hidden');
      document.getElementById('calllogsTab').classList.add('hidden');
      document.getElementById('enterpriseTab').classList.add('hidden');
      document.getElementById('approvalsTab').classList.add('hidden');

      if (tab === 'products') {
        document.getElementById('productsTab').classList.remove('hidden');
      } else if (tab === 'orders') {
        document.getElementById('ordersTab').classList.remove('hidden');
        loadOrders();
      } else if (tab === 'apikeys') {
        document.getElementById('apikeysTab').classList.remove('hidden');
        loadApiKeys();
      } else if (tab === 'calllogs') {
        document.getElementById('calllogsTab').classList.remove('hidden');
        loadCallLogs();
      } else if (tab === 'enterprise') {
        document.getElementById('enterpriseTab').classList.remove('hidden');
        loadEnterpriseInfo();
        loadMyApplications();
      } else if (tab === 'approvals') {
        document.getElementById('approvalsTab').classList.remove('hidden');
        loadApprovals();
      }
    }

    function showOrderModal(productId) {
      currentProduct = products.find(p => p.id === productId);
      if (!currentProduct) return;

      document.getElementById('orderProductName').textContent = currentProduct.name;
      document.getElementById('orderType').value = 'per_call';
      document.getElementById('orderQuantity').value = 100;
      document.getElementById('orderMonths').value = 1;
      toggleQuantity();
      document.getElementById('orderModal').classList.add('show');
    }

    function toggleQuantity() {
      const type = document.getElementById('orderType').value;
      document.getElementById('quantityGroup').style.display = type === 'per_call' ? 'block' : 'none';
      document.getElementById('monthsGroup').style.display = type === 'subscription' ? 'block' : 'none';
      calculateAmount();
    }

    function calculateAmount() {
      if (!currentProduct) return;
      const type = document.getElementById('orderType').value;
      let amount = 0;
      if (type === 'per_call') {
        amount = currentProduct.pricePerCall * (parseInt(document.getElementById('orderQuantity').value) || 0);
      } else {
        amount = currentProduct.subscriptionPrice * (parseInt(document.getElementById('orderMonths').value) || 0);
      }
      document.getElementById('orderAmount').textContent = '¥' + amount.toFixed(2);
    }

    document.getElementById('orderQuantity')?.addEventListener('input', calculateAmount);
    document.getElementById('orderMonths')?.addEventListener('input', calculateAmount);

    async function submitOrder() {
      if (!currentProduct) return;

      const orderType = document.getElementById('orderType').value;
      const quantity = parseInt(document.getElementById('orderQuantity').value) || 100;
      const months = parseInt(document.getElementById('orderMonths').value) || 1;
      const paymentType = document.getElementById('orderPaymentType').value;
      const paymentMethod = document.getElementById('orderPaymentMethod').value;

      const res = await fetch(API_BASE + '/orders', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          product: currentProduct.id,
          orderType,
          quantity: orderType === 'per_call' ? quantity : months,
          paymentType,
          paymentMethod
        })
      });

      const data = await res.json();
      if (res.ok) {
        alert('订单提交成功，等待审核');
        closeModal('orderModal');
        loadOrders();
      } else {
        alert(data.message || '订单提交失败');
      }
    }
  </script>
</body>
</html>
