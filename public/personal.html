<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - 个人中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
    .header { background: #001529; color: #fff; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .logo { font-size: 18px; font-weight: bold; cursor: pointer; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .enterprise-selector { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 4px; }
    .enterprise-selector select { border: none; background: transparent; font-size: 14px; cursor: pointer; color: #fff; }
    .enterprise-selector span { color: rgba(255,255,255,0.7); font-size: 14px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #1890ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
    .user-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-width: 180px; z-index: 1000; display: none; overflow: hidden; }
    .user-dropdown.show { display: block; }
    .dropdown-item { padding: 12px 16px; color: #333; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .dropdown-item:hover { background: #f5f5f5; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
    .btn-small { padding: 5px 12px; font-size: 13px; }
    .hidden { display: none !important; }
    .main-layout { display: flex; padding-top: 60px; min-height: 100vh; }
    .sidebar { width: 180px; background: #fff; border-right: 1px solid #e8e8e8; position: fixed; top: 60px; left: 0; bottom: 0; overflow-y: auto; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #e8e8e8; text-align: center; font-weight: 500; color: #333; }
    .sidebar-menu-item { padding: 12px 20px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; font-size: 14px; border-left: 3px solid transparent; }
    .sidebar-menu-item:hover { color: #1890ff; background: #e6f7ff; }
    .sidebar-menu-item.active { color: #1890ff; background: #e6f7ff; border-left-color: #1890ff; font-weight: 500; }
    .content { flex: 1; margin-left: 180px; padding: 20px; }
    .content-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; }
    .content-card-header { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .card-body { padding: 0; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background: #fafafa; font-weight: 500; color: #333; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status-active { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .status-inactive { background: #fff2e8; color: #fa8c16; border: 1px solid #ffbb6b; }
    .status-pending { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; padding: 20px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { margin-bottom: 20px; font-size: 18px; font-weight: 500; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; }
    .api-key-box { background: #f5f5f5; padding: 15px; border-radius: 4px; font-family: monospace; word-break: break-all; margin: 10px 0; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .enterprise-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #e8e8e8; border-radius: 4px; margin-bottom: 10px; }
    .enterprise-item:hover { border-color: #1890ff; }
    .enterprise-item.current { border-color: #1890ff; background: #e6f7ff; }
    .enterprise-name { font-weight: 500; }
    .enterprise-role { font-size: 12px; color: #999; }
    .enterprise-actions { display: flex; gap: 10px; }
    .no-enterprise { text-align: center; padding: 60px 20px; }
    .no-enterprise h3 { margin-bottom: 20px; color: #666; }
    .no-enterprise p { color: #999; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo" onclick="goToMarket()">工作台</div>
      <div class="enterprise-selector hidden" id="enterpriseSelector">
        <span>当前企业：</span>
        <select id="currentEnterprise" onchange="switchEnterprise()"></select>
      </div>
      <button class="btn btn-default btn-small" onclick="goToMarket()">返回首页</button>
    </div>
    <div class="user-info">
      <span id="userName"></span>
      <div style="position: relative;">
        <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()"></div>
        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-item" onclick="logout()">
            <span>🚪</span> 退出登录
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-header">我的账户</div>
      <div class="sidebar-menu-item active" onclick="switchTab('services')" id="servicesBtn">
        <span>🔗</span> 我的API服务
      </div>
      <div class="sidebar-menu-item" onclick="switchTab('orders')" id="ordersBtn">
        <span>📋</span> 我的订单
      </div>
      <div class="sidebar-menu-item" onclick="switchTab('apikeys')" id="apikeysBtn">
        <span>🔑</span> API密钥
      </div>
      <div class="sidebar-menu-item" onclick="switchTab('calllogs')" id="calllogsBtn">
        <span>📊</span> 调用记录
      </div>
      <div class="sidebar-menu-item" onclick="switchTab('enterprise')" id="enterpriseBtn">
        <span>🏢</span> 企业管理
      </div>
      <div class="sidebar-menu-item hidden" onclick="switchTab('approvals')" id="approvalsBtn">
        <span>✅</span> 审批管理
      </div>
    </div>

    <div class="content">
      <div id="noEnterprise" class="hidden">
        <div class="content-card">
          <div class="content-card-header">提示</div>
          <div class="card-body">
            <div class="no-enterprise">
              <h3>您还没有绑定任何企业</h3>
              <p>可以创建新企业或申请绑定已有企业</p>
              <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn btn-primary" onclick="showCreateEnterpriseModal()">创建企业</button>
                <button class="btn btn-default" onclick="showBindEnterpriseModal()">绑定已有企业</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="enterpriseContent" class="hidden">
        <div id="servicesTab">
          <div class="content-card">
            <div class="content-card-header">我的API服务</div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>产品</th><th>预付配额</th><th>后付配额</th><th>自动续订</th><th>操作</th></tr></thead>
                  <tbody id="servicesTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div id="ordersTab" class="hidden">
          <div class="content-card">
            <div class="content-card-header">我的订单</div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>订单号</th><th>产品</th><th>类型</th><th>金额</th><th>审核状态</th><th>支付状态</th><th>时间</th></tr></thead>
                  <tbody id="ordersTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div id="apikeysTab" class="hidden">
          <div class="content-card">
            <div class="content-card-header">API密钥</div>
            <div class="card-body">
              <div style="margin-bottom:15px;">
                <select id="apiKeyType" onchange="loadApiKeys()" style="padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;">
                  <option value="enterprise">企业API密钥</option>
                  <option value="personal">个人API密钥</option>
                </select>
                <button class="btn btn-primary btn-small" onclick="showGenerateApiKeyModal()" style="margin-left:10px;">生成新密钥</button>
              </div>
              <div id="apiKeyList"></div>
            </div>
          </div>
        </div>

        <div id="calllogsTab" class="hidden">
          <div class="content-card">
            <div class="content-card-header">调用记录</div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead><tr><th>调用时间</th><th>产品</th><th>响应码</th><th>响应信息</th><th>耗时</th></tr></thead>
                  <tbody id="callLogsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div id="enterpriseTab" class="hidden">
          <div class="content-card">
            <div class="content-card-header">
              <span>绑定的企业</span>
              <div>
                <button class="btn btn-default btn-small" onclick="showBindEnterpriseModal()">绑定新企业</button>
                <button class="btn btn-primary btn-small" onclick="showCreateEnterpriseModal()" style="margin-left:8px;">创建企业</button>
              </div>
            </div>
            <div class="card-body" id="enterpriseList"></div>
          </div>
          <div class="content-card">
            <div class="content-card-header">我的申请记录</div>
            <div class="card-body" id="myApplicationsList"></div>
          </div>
        </div>

        <div id="approvalsTab" class="hidden">
          <div class="content-card">
            <div class="content-card-header">待审批的绑定申请</div>
            <div class="card-body" id="pendingApprovalsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="createEnterpriseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">创建企业</div>
      <div class="form-group">
        <label>企业名称</label>
        <input type="text" id="enterpriseName" placeholder="请输入企业名称">
      </div>
      <div class="form-group">
        <label>统一社会信用代码</label>
        <input type="text" id="enterpriseCode" placeholder="请输入统一社会信用代码">
      </div>
      <div class="form-group">
        <label>联系人</label>
        <input type="text" id="contactName" placeholder="请输入联系人姓名">
      </div>
      <div class="form-group">
        <label>联系电话</label>
        <input type="text" id="contactPhone" placeholder="请输入联系电话">
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('createEnterpriseModal')">取消</button>
        <button class="btn btn-primary" onclick="createEnterprise()">创建</button>
      </div>
    </div>
  </div>

  <div id="bindEnterpriseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">绑定已有企业</div>
      <div class="form-group">
        <label>企业ID</label>
        <input type="text" id="bindEnterpriseId" placeholder="请输入企业ID">
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('bindEnterpriseModal')">取消</button>
        <button class="btn btn-primary" onclick="bindEnterprise()">绑定</button>
      </div>
    </div>
  </div>

  <div id="generateApiKeyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">生成API密钥</div>
      <div class="form-group">
        <label>密钥名称</label>
        <input type="text" id="apiKeyName" placeholder="请输入密钥名称">
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('generateApiKeyModal')">取消</button>
        <button class="btn btn-primary" onclick="generateApiKey()">生成</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001/api';
    let token = localStorage.getItem('accountToken');
    let accountName = localStorage.getItem('accountName');
    let enterprises = [];
    let currentEnterpriseId = localStorage.getItem('currentEnterpriseId');
    let currentEnterpriseName = localStorage.getItem('currentEnterpriseName');

    document.addEventListener('DOMContentLoaded', async function() {
      if (!token) {
        window.location.href = 'client.html';
        return;
      }
      document.getElementById('userName').textContent = accountName;
      document.getElementById('userAvatar').textContent = (accountName || '用户').charAt(0).toUpperCase();
      await loadProfile();
      switchTab('services');
    });

    function toggleDropdown() {
      document.getElementById('userDropdown').classList.toggle('show');
    }

    document.addEventListener('click', function(e) {
      const avatar = document.getElementById('userAvatar');
      const dropdown = document.getElementById('userDropdown');
      if (!avatar?.contains(e.target) && !dropdown?.contains(e.target)) {
        dropdown?.classList.remove('show');
      }
    });

    function goToMarket() {
      window.location.href = 'client.html';
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'client.html';
    }

    async function loadProfile() {
      try {
        const res = await fetch(API_BASE + '/accounts/profile', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.message || '获取信息失败');
          logout();
          return;
        }

        enterprises = data.customers || [];
        const isAdmin = enterprises.some(e => e.role === 'admin');
        document.getElementById('approvalsBtn').classList.toggle('hidden', !isAdmin);

        if (enterprises.length === 0) {
          document.getElementById('noEnterprise').classList.remove('hidden');
          document.getElementById('enterpriseContent').classList.add('hidden');
          document.getElementById('enterpriseSelector').classList.add('hidden');
        } else {
          document.getElementById('noEnterprise').classList.add('hidden');
          document.getElementById('enterpriseContent').classList.remove('hidden');
          document.getElementById('enterpriseSelector').classList.remove('hidden');

          if (!currentEnterpriseId || !enterprises.find(e => e.customerId === parseInt(currentEnterpriseId))) {
            currentEnterpriseId = enterprises[0].customerId;
            currentEnterpriseName = enterprises[0].companyName;
            localStorage.setItem('currentEnterpriseId', currentEnterpriseId);
            localStorage.setItem('currentEnterpriseName', currentEnterpriseName);
          }

          renderEnterpriseSelector();
        }
      } catch (error) {
        console.error('loadProfile error:', error);
        alert('获取信息失败');
        logout();
      }
    }

    function renderEnterpriseSelector() {
      const select = document.getElementById('currentEnterprise');
      select.innerHTML = enterprises.map(e =>
        `<option value="${e.customerId}" ${e.customerId == currentEnterpriseId ? 'selected' : ''}>${e.companyName}</option>`
      ).join('');
    }

    function switchEnterprise() {
      const select = document.getElementById('currentEnterprise');
      currentEnterpriseId = parseInt(select.value);
      currentEnterpriseName = enterprises.find(e => e.customerId === currentEnterpriseId)?.companyName || '';
      localStorage.setItem('currentEnterpriseId', currentEnterpriseId);
      localStorage.setItem('currentEnterpriseName', currentEnterpriseName);
      loadCurrentTabData();
    }

    function switchTab(tab) {
      document.querySelectorAll('.sidebar-menu-item').forEach(item => item.classList.remove('active'));
      document.getElementById(tab + 'Btn')?.classList.add('active');

      document.getElementById('servicesTab').classList.add('hidden');
      document.getElementById('ordersTab').classList.add('hidden');
      document.getElementById('apikeysTab').classList.add('hidden');
      document.getElementById('calllogsTab').classList.add('hidden');
      document.getElementById('enterpriseTab').classList.add('hidden');
      document.getElementById('approvalsTab').classList.add('hidden');

      document.getElementById(tab + 'Tab')?.classList.remove('hidden');
      loadCurrentTabData();
    }

    function loadCurrentTabData() {
      const activeTab = document.querySelector('.sidebar-menu-item.active');
      if (!activeTab) return;
      const tab = activeTab.id.replace('Btn', '');

      if (tab === 'services') loadServices();
      else if (tab === 'orders') loadOrders();
      else if (tab === 'apikeys') loadApiKeys();
      else if (tab === 'calllogs') loadCallLogs();
      else if (tab === 'enterprise') { loadEnterpriseInfo(); loadMyApplications(); }
      else if (tab === 'approvals') loadApprovals();
    }

    async function loadServices() {
      try {
        const headers = { 'Authorization': 'Bearer ' + token };
        const [quotaRes, accountRes] = await Promise.all([
          fetch(API_BASE + '/my/quotas?customerId=' + currentEnterpriseId, { headers }),
          fetch(API_BASE + '/accounts/' + currentEnterpriseId, { headers })
        ]);
        const quotaData = await quotaRes.json();
        const accountData = await accountRes.json();
        const quotas = quotaData.quotas || [];

        document.getElementById('servicesTableBody').innerHTML = quotas.map(q => {
          const productRes = fetch(API_BASE + '/products').then(r => r.json()).then(pData => {
            const product = pData.products?.find(p => p.id === q.productId);
            return product ? product.name : '产品' + q.productId;
          }).catch(() => '产品' + q.productId);
          return `
            <tr>
              <td>${q.productId}</td>
              <td>${q.prepaidQuota || 0}</td>
              <td>${q.postpaidQuota || 0}</td>
              <td>${q.autoRenew ? '是' : '否'}</td>
              <td><button class="btn btn-default btn-small">配置</button></td>
            </tr>
          `;
        }).join('') || '<tr><td colspan="5" class="empty">暂无API服务</td></tr>';
      } catch (error) {
        console.error('loadServices error:', error);
      }
    }

    async function loadOrders() {
      try {
        const res = await fetch(API_BASE + '/orders', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const orders = data.orders || [];

        document.getElementById('ordersTableBody').innerHTML = orders.map(o => `
          <tr>
            <td>${o.orderNo || o.id}</td>
            <td>${o.product?.name || '-'}</td>
            <td>${o.orderType === 'per_call' ? '按次' : '订阅'}</td>
            <td>¥${o.amount}</td>
            <td><span class="status ${o.reviewStatus === 'approved' ? 'status-active' : o.reviewStatus === 'rejected' ? 'status-inactive' : 'status-pending'}">${o.reviewStatus === 'approved' ? '已通过' : o.reviewStatus === 'rejected' ? '已拒绝' : '待审核'}</span></td>
            <td><span class="status ${o.paymentStatus === 'paid' ? 'status-active' : 'status-pending'}">${o.paymentStatus === 'paid' ? '已支付' : '未支付'}</span></td>
            <td>${new Date(o.createdAt).toLocaleString()}</td>
          </tr>
        `).join('') || '<tr><td colspan="7" class="empty">暂无订单</td></tr>';
      } catch (error) {
        console.error('loadOrders error:', error);
      }
    }

    async function loadApiKeys() {
      const type = document.getElementById('apiKeyType').value;
      try {
        const res = await fetch(API_BASE + '/accounts/apikeys?type=' + type, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const keys = data.apiKeys || [];

        document.getElementById('apiKeyList').innerHTML = keys.map(k => `
          <div class="api-key-box">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <strong>${k.name || 'API密钥'}</strong>
              <span style="color:#999;font-size:12px;">${new Date(k.createdAt).toLocaleDateString()}</span>
            </div>
            <div style="word-break:break-all;font-family:monospace;">${k.apiKey || k.appKey}</div>
          </div>
        `).join('') || '<div class="empty">暂无API密钥</div>';
      } catch (error) {
        console.error('loadApiKeys error:', error);
      }
    }

    function showGenerateApiKeyModal() {
      document.getElementById('generateApiKeyModal').classList.add('show');
    }

    async function generateApiKey() {
      const name = document.getElementById('apiKeyName').value;
      if (!name) { alert('请输入密钥名称'); return; }

      try {
        const res = await fetch(API_BASE + '/accounts/regenerate-apikey', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ name, customerId: currentEnterpriseId })
        });
        const data = await res.json();
        if (res.ok) {
          alert('密钥生成成功');
          closeModal('generateApiKeyModal');
          document.getElementById('apiKeyName').value = '';
          loadApiKeys();
        } else {
          alert(data.message || '生成失败');
        }
      } catch (error) {
        console.error('generateApiKey error:', error);
        alert('生成失败');
      }
    }

    async function loadCallLogs() {
      try {
        const res = await fetch(API_BASE + '/call-logs', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const logs = data.logs || [];

        document.getElementById('callLogsTableBody').innerHTML = logs.map(l => `
          <tr>
            <td>${new Date(l.callTime).toLocaleString()}</td>
            <td>${l.productName || '-'}</td>
            <td><span class="status ${l.responseCode === 200 ? 'status-active' : 'status-inactive'}">${l.responseCode}</span></td>
            <td>${l.responseMessage || '-'}</td>
            <td>${l.duration || 0}ms</td>
          </tr>
        `).join('') || '<tr><td colspan="5" class="empty">暂无调用记录</td></tr>';
      } catch (error) {
        console.error('loadCallLogs error:', error);
      }
    }

    async function loadEnterpriseInfo() {
      try {
        const res = await fetch(API_BASE + '/accounts/customers/' + currentEnterpriseId + '/accounts', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const accounts = data.accounts || [];

        document.getElementById('enterpriseList').innerHTML = enterprises.map(e => `
          <div class="enterprise-item ${e.customerId == currentEnterpriseId ? 'current' : ''}">
            <div>
              <div class="enterprise-name">${e.companyName}</div>
              <div class="enterprise-role">角色: ${e.role === 'admin' ? '管理员' : '普通成员'}</div>
            </div>
            <div class="enterprise-actions">
              ${e.customerId != currentEnterpriseId ? `<button class="btn btn-primary btn-small" onclick="switchToEnterprise(${e.customerId}, '${e.companyName}')">切换</button>` : '<span class="status status-active">当前</span>'}
            </div>
          </div>
        `).join('') || '<div class="empty">暂无绑定的企业</div>';
      } catch (error) {
        console.error('loadEnterpriseInfo error:', error);
      }
    }

    function switchToEnterprise(id, name) {
      currentEnterpriseId = id;
      currentEnterpriseName = name;
      localStorage.setItem('currentEnterpriseId', currentEnterpriseId);
      localStorage.setItem('currentEnterpriseName', currentEnterpriseName);
      renderEnterpriseSelector();
      loadCurrentTabData();
    }

    async function loadMyApplications() {
      try {
        const res = await fetch(API_BASE + '/accounts/my-applications', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const applications = data.applications || [];

        document.getElementById('myApplicationsList').innerHTML = applications.map(a => `
          <div class="enterprise-item">
            <div>
              <div class="enterprise-name">${a.companyName || '企业' + a.customerId}</div>
              <div class="enterprise-role">申请时间: ${new Date(a.createdAt).toLocaleString()}</div>
            </div>
            <span class="status ${a.status === 'approved' ? 'status-active' : a.status === 'rejected' ? 'status-inactive' : 'status-pending'}">${a.status === 'approved' ? '已通过' : a.status === 'rejected' ? '已拒绝' : '待审核'}</span>
          </div>
        `).join('') || '<div class="empty">暂无申请记录</div>';
      } catch (error) {
        console.error('loadMyApplications error:', error);
      }
    }

    async function loadApprovals() {
      try {
        const res = await fetch(API_BASE + '/accounts/pending-binds?customerId=' + currentEnterpriseId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const pendingBinds = data.pendingBinds || [];

        document.getElementById('pendingApprovalsList').innerHTML = pendingBinds.map(b => `
          <div class="enterprise-item">
            <div>
              <div class="enterprise-name">${b.applicantName || '申请人'}</div>
              <div class="enterprise-role">申请企业: ${b.companyName || '-'} | 申请时间: ${new Date(b.createdAt).toLocaleString()}</div>
            </div>
            <div class="enterprise-actions">
              <button class="btn btn-primary btn-small" onclick="approveApplication(${b.bindingId})">通过</button>
              <button class="btn btn-default btn-small" onclick="rejectApplication(${b.bindingId})">拒绝</button>
            </div>
          </div>
        `).join('') || '<div class="empty">暂无待审批的申请</div>';
      } catch (error) {
        console.error('loadApprovals error:', error);
      }
    }

    async function approveApplication(bindingId) {
      try {
        const res = await fetch(API_BASE + '/accounts/approve-bind/' + bindingId, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          alert('审批通过');
          loadApprovals();
        } else {
          alert('审批失败');
        }
      } catch (error) {
        console.error('approveApplication error:', error);
      }
    }

    async function rejectApplication(bindingId) {
      try {
        const res = await fetch(API_BASE + '/accounts/reject-bind/' + bindingId, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          alert('已拒绝');
          loadApprovals();
        } else {
          alert('操作失败');
        }
      } catch (error) {
        console.error('rejectApplication error:', error);
      }
    }

    function showCreateEnterpriseModal() {
      document.getElementById('createEnterpriseModal').classList.add('show');
    }

    async function createEnterprise() {
      const companyName = document.getElementById('enterpriseName').value;
      const businessLicense = document.getElementById('enterpriseCode').value;
      const contact = document.getElementById('contactName').value;
      const contactPhone = document.getElementById('contactPhone').value;

      if (!companyName || !businessLicense) {
        alert('请填写完整信息');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/accounts/customers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ companyName, businessLicense, contact, contactPhone })
        });
        const data = await res.json();

        if (res.ok) {
          alert('企业创建成功');
          closeModal('createEnterpriseModal');
          document.getElementById('enterpriseName').value = '';
          document.getElementById('enterpriseCode').value = '';
          document.getElementById('contactName').value = '';
          document.getElementById('contactPhone').value = '';
          await loadProfile();
        } else {
          alert(data.message || '创建失败');
        }
      } catch (error) {
        console.error('createEnterprise error:', error);
        alert('创建失败');
      }
    }

    function showBindEnterpriseModal() {
      document.getElementById('bindEnterpriseModal').classList.add('show');
    }

    async function bindEnterprise() {
      const customerId = document.getElementById('bindEnterpriseId').value;
      if (!customerId) {
        alert('请输入企业ID');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/accounts/bind-customer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ customerId: parseInt(customerId) })
        });
        const data = await res.json();

        if (res.ok) {
          alert('申请已提交，请等待企业管理员审批');
          closeModal('bindEnterpriseModal');
          document.getElementById('bindEnterpriseId').value = '';
          loadMyApplications();
        } else {
          alert(data.message || '绑定失败');
        }
      } catch (error) {
        console.error('bindEnterprise error:', error);
        alert('绑定失败');
      }
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    window.onclick = function(event) {
      if (event.target.classList.contains('modal')) {
        event.target.classList.remove('show');
      }
    };
  </script>
</body>
</html>
